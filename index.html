text:"Peel and mash the bananas thoroughly in a large bowl until almost smooth. A few small lumps are fine."},{step:3,title:"Mix wet ingredients",text:"Add almond butter, oat milk, and vanilla to the mashed banana. Stir until fully combined. If the almond butter is stiff, warm it briefly first."},{step:4,title:"Add dry ingredients",text:"Add oat flour, baking powder, baking soda, cinnamon, and salt. Fold gently until just combined — don't overmix. If the batter feels very thick, add an extra tablespoon of oat milk."},{step:5,title:"Fold in blueberries",text:"Add frozen blueberries straight from the freezer. Fold in with just 3–4 stirs to prevent them bleeding into the batter."},{step:6,title:"Fill & bake",text:"Spoon batter into the moulds, filling each ¾ full. Bake for 45–55 minutes until golden and a skewer comes out clean."},{step:7,title:"Cool",text:"Cool in the mould for at least 15 minutes before popping out. Cool fully before serving — oat flour crumb is soft when warm."}],options:[{label:"Flour swap",text:"Replace oat flour with 1 cup oat + ½ cup amaranth + ½ cup quinoa for extra protein and iron."},{label:"Fruit swap",text:"Fold in grated courgette or raspberries instead of blueberries."},{label:"Loaf tin",text:"Pour batter into a greased standard loaf tin (22×12 cm). Bake at 175°C for 45–55 min until a skewer comes out clean. Cool in tin 10 min, then transfer to a rack. Makes ~10 slices."},{label:"Muffin tin",text:"Fill a standard 12-hole muffin tin ¾ full. Bake at 175°C for 20–25 min. Makes ~10–12 muffins — great for smaller toddler portions."}],image:"data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDAAUDBAQEAwUEBAQFBQUGBwwIBwcHBw8LCwkMEQ8SEhEPERETFhwXExQaFRERGCEYGh0dHx8fExciJCIeJBweHx7/2wBDAQUFBQcGBw4ICA4eFBEUHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh7/wAARCAOEA4QDASIAAhEBAxEB/8QAHwAAAQUBAQEBAQEAAAAAAAAAAAECAwQFBgcICQoL/8QAtRAAAgEDAwIEAwUFBAQAAAF9AQIDAAQRBRIhMUEGE1FhByJxFDKBkaEII0KxwRVS0fAkM2JyggkKFhcYGRolJicoKSo0NTY3ODk6Q0R g them in, simply add ½–1 tbsp more flour to bring it back together."},{step:3,title:"Mash bananas",text:"Peel and mash bananas thoroughly until completely smooth. The smoother the better — chunks make shaping difficult."},{step:4,title:"Add fat — Track A, B, or C",text:"Track A: stir in nut butter (warm briefly if stiff). Track B: stir in oil until combined. Track C: skip this step entirely."},{step:5,title:"Add binder + flour",text:"Option 1 (psyllium): add psyllium husk directly to the batter with the flour, stir well and rest 2 minutes — it activates quickly in the batter. Option 2 (flax): mix 2 tbsp ground flaxseed + 5 tbsp water, rest 5 min until a gel forms, then stir into the banana before adding flour. Option 3 (chia): mix 2 tbsp chia seeds + 5 tbsp water, rest 10 min until gel forms, then add with flour. For all options: if the batter still feels too wet after resting, add ½ tbsp more flour."},{step:6,title:"Fold in berries",text:"If using, gently fold in drained berries with 3–4 stirs. Don't overmix. If batter loosens, add ½–1 tbsp more flour."},{step:7,title:"Shape on pan",text:"Spoon batter onto the silicone mat in rounds. Using the back of a wet spoon, flatten each to less than ½ cm thick, roughly 7–8 cm in diameter. Keep thickness even. Leave a small gap between each."},{step:8,title:"First bake — 15 min",text:"Bake for 15 minutes. Do not open the oven before 12 minutes."},{step:9,title:"Check and flip",text:"Press the edge of one pancake — it should hold shape and feel set, not sticky. If ready, flip with a thin spatula. If still soft, bake 3–5 more minutes first."},{step:10,title:"Second bake — 5 min",text:"Bake for a further 5 minutes after flipping."},{step:11,title:"Cool completely",text:"Leave on the pan to cool fully — at least 15 minutes. These firm up significantly as they cool. Do not judge texture while warm. If inside is too soft once cooled, add 1 more tbsp flour next batch."}],options:[{label:"Track A — Nut butter",text:"2 tbsp almond, peanut, or cashew butter. Best nutritional profile — adds protein, healthy fats, and richness."},{label:"Track B — Oil (nursery-safe)",text:"1 tbsp olive oil (best fat profile), coconut oil (subtle sweetness), or avocado oil (neutral). No tree nuts — safe for most nursery nut-free policies."},{label:"Track C — Plain",text:"Omit fat entirely. Lightest calorie version, still holds together well thanks to psyllium husk."},{label:"Flour swap",text:"Oat flour = softest texture. Quinoa flour = more protein, toast first. Amaranth = denser, use max 1 tbsp in a 3 tbsp total mix."},{label:"Berry adjustment",text:"Every ¼ cup berries = add ½ tbsp extra flour to compensate for moisture. Fresh needs less adjustment than frozen."},{label:"Binder Option 1 — Psyllium husk (recommended)",text:"2 tbsp ground psyllium husk mixed directly into the batter. Strongest binding, holds shape best under heat. Adds soluble fibre supporting gut health and satiety."},{label:"Binder Option 2 — Ground flaxseed",text:"Mix 2 tbsp ground flaxseed + 5 tbsp water, rest 5 min until gel forms, then add to batter. Adds omega-3 fatty acids and lignans. Slightly weaker bind — add ½ tbsp extra flour and allow 2–3 extra minutes baking."},{label:"Binder Option 3 — Chia seeds",text:"Mix 2 tbsp chia seeds + 5 tbsp water, rest 10 min until gel forms. Adds omega-3s, calcium, and iron. Slightly grainy texture but holds well. Whole chia seeds visible in the pancake — can grind first for a smoother result."}],tips:["Spottier bananas = more natural sweetness and better binding","If using psyllium husk: add directly to batter, rest 2 min — it activates fast. If using flax or chia: mix with water first and rest 5–10 min before adding","Use a wet spoon back to flatten pancakes evenly — thickness consistency is key","Do not open the oven in the first 12 minutes","Cool fully before tasting — psyllium-bound pancakes firm up significantly as they cool","If too soft after cooling: add 1 tbsp more flour next batch, or reduce be :1,title:"Soften the base",text:"Warm olive oil in a medium saucepan over low-medium heat. Add onion and carrot and cook gently for 6–8 minutes until soft and translucent — the carrot should be tender. Add garlic and cook 1 more minute. Do not brown — keep it gentle for toddler-friendly flavour."},{step:2,title:"Add flavour base",text:"Track 1 (Mild & Savoury): skip this step — stock goes in at step 3. Track 2 (Tomato): add chopped tomatoes and stir for 2 minutes. Track 3 (Coconut): add coconut milk and stir for 1 minute. All tracks then continue to step 3."},{step:3,title:"Add stock and carb base",text:"Pour in the stock (all tracks). Add your chosen carb and stir well. Cooking times: giant couscous 8–10 min, orzo 7–9 min, amaranth 15–18 min (add extra ¼ cup stock if it thickens too fast). Bring to a gentle simmer and cook uncovered, stirring occasionally."},{step:4,title:"Add peas and chickpeas",text:"When the carb is 2 minutes from done, add frozen peas and chickpeas if using. Stir through — frozen peas need only 2–3 minutes. Do not overcook or they lose their bright green colour and sweetness."},{step:5,title:"Adjust consistency",text:"The stew should be thick enough to stay on a spoon — not soupy. If too thin, simmer uncovered 2–3 more minutes. If too thick, add a splash of stock or water. For a creamier texture, mash a few spoonfuls of peas against the side of the pan and stir back in."},{step:6,title:"Finish and serve",text:"Track 1 (Mild & Savoury): stir in lemon juice for brightness. All tracks: scatter fresh herbs if using. Taste before serving — a tiny pinch of salt is fine for toddlers over 12 months if needed. Serve warm, not hot. Blend partially with a stick blender for a smoother texture if preferred."}],options:[{label:"Carb — Giant couscous",text:"Chewy, holds shape well, stays on the spoon beautifully. Cooks in 8–10 min. No need to rinse for a stew — the starch helps thicken the liquid. Best all-round choice."},{label:"Carb — Orzo",text:"Silkier and smaller, blends into the stew more. Great for younger toddlers or a smoother texture. Cooks in 7–9 min."},{label:"Carb — Amaranth",text:"Densest and most nutritious (protein, iron, calcium). Turns the stew almost porridge-like — perfect for spoon practice. Cooks in 15–18 min. Keeps thickening as it cools; add extra stock when reheating."},{label:"Flavour Track 1 — Mild & Savoury",text:"Stock, onion, garlic, finish with a squeeze of lemon. Clean and neutral — the most toddler-friendly gateway flavour."},{label:"Flavour Track 2 — Tomato",text:"Adds richness and mild sweetness. The most filling version. Pairs best with giant couscous or orzo."},{label:"Flavour Track 3 — Coconut",text:"Creamy and gently sweet — pairs exceptionally well with peas. Use full-fat coconut milk for the best texture. Often a toddler favourite."}],tips:["Peas go in last — 2–3 min only to keep them sweet and bright green","Amaranth keeps thickening after cooking — make it slightly looser than you want","SouperCubes are ideal for freezing individual portions of this stew","Mash a few peas against the pan side for extra creaminess without any cream","Reheat with a splash of stock or water — all three carb bases absorb liquid as they sit","Use proper low-sodium stock — toddlers under 12 months need no added salt","Freezer: keeps well for 2–3 months. Freeze in individual portions — SouperCubes work perfectly. Reheat in a saucepan with a splash of stock or water to loosen as all three carb bases absorb liquid as they sit."],image:"data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDAAUDBAQEAwUEBAQFBQUGBwwIBwcHBw8LCwkMEQ8SEhEPERETFhwXExQaFRERGCEYGh0dHx8fExciJCIeJBweHx7/2wBDAQUFBQcGBw4ICA4eFBEUHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh7/wAARCAOEA4QDASIAAhEBAxEB/8QAHwAAAQUBAQEBAQEAAAAAAAAAAAECAwQFBgcICQoL/8QAtRAAAgEDAwIEAwUFBAQAAAF9AQIDAAQRBRIhMUEGE1FhByJxFDKBkaEII0KxwRVS0fAkM2JyggkKFhcYGRolJicoKSo0NTY3ODk6Q0RFRkdISUpTVFVWV1hZWmNkZWZnaGlqc3R1dnd4eXqDhIWGh4iJipKTlJWWl5iZmqKjp snack","breakfast"],plantBased:true,freezerFriendly:true,toddlerFriendly:true,servings:4,nutrition:{calories:310,protein:7,carbs:52,fat:9,fibre:5,sugar:14,addedSugar:0,sodium:210,note:"Per cube (1 of 4) in a 1-cup SouperCubes mould. Estimated — lighter than the almond butter version."},ingredients:["3 very ripe bananas (the blacker the better)","3 tbsp mild olive oil","2 tbsp oat milk (or any plant milk)","1 tsp vanilla extract","1 tsp apple cider vinegar","2 cups oat flour","2 tsp baking powder","½ tsp baking soda","1 tsp cinnamon","¼ tsp salt","½ cup frozen berries (do not thaw)","1 tsp sunflower seeds per cube for topping"],method:[{step:1,title:"Preheat & prep moulds",text:"Preheat oven to 170°C (340°F). Lightly grease each SouperCubes cavity and place the mould on a flat baking tray."},{step:2,title:"Mash bananas",text:"Peel and mash bananas thoroughly until completely smooth."},{step:3,title:"Mix wet ingredients",text:"Add olive oil, oat milk, vanilla, and apple cider vinegar to the mashed banana. Stir well until fully combined with no oily streaks."},{step:4,title:"Add dry ingredients",text:"Add oat flour, baking powder, baking soda, cinnamon, and salt. Fold gently until just combined — don't overmix."},{step:5,title:"Fold in berries",text:"Add frozen berries straight from the freezer. Fold in with 3–4 stirs only."},{step:6,title:"Fill moulds and top with seeds",text:"Spoon batter into the SouperCubes cavities, filling each ¾ full. Smooth the tops with a wet spoon. Sprinkle sunflower seeds over each and press very lightly into the surface."},{step:7,title:"Bake — 50 min",text:"Bake for 50 minutes at 170°C. Check with a skewer at 45 minutes — it should come out with just a few moist crumbs. If wet batter, give it the full 50 minutes."},{step:8,title:"Rest in switched-off oven — 15 min",text:"Switch off the oven and leave the mould inside for 15 minutes with the door closed. This gentle residual heat helps the centre finish setting without overbaking the outside."},{step:9,title:"Cool in mould",text:"Remove from oven. Leave in the mould for at least 15 minutes before popping out. Cool fully on a rack before serving — the crumb firms up significantly as it cools."}],options:[{label:"Seed topping",text:"Sunflower seeds or pumpkin seeds both work well — press lightly into the surface before baking. They toast and embed as the top sets."},{label:"Berry choice",text:"Any frozen berry works — blueberries, raspberries, or mixed. ½ cup maximum for the cube format regardless of berry type."},{label:"Flour variation",text:"Can add up to ½ cup amaranth flour replacing ½ cup oat flour for extra protein and iron — but keep oat flour as the dominant base for the SouperCubes format."}],tips:["Use blackened bananas for maximum natural sweetness","ACV goes in with the wet ingredients — it activates the baking soda when the dry ingredients hit it","½ cup berries maximum — more than this and the centre won't cook through","Rest 15 min in the switched-off oven — this is what finishes the centre without overbaking","Cool fully before serving — the crumb firms up significantly as it cools","Lighter and less rich than the almond butter version — good for everyday batches","Freezer: keeps well for 2–3 months. Cool completely before freezing. Reheat uncovered at 160°C for 8–10 min to restore texture."],image:null,accentColor:"#c8832a",emoji:"🍞"}];var Icon=function Icon(_ref){var name=_ref.name,_ref$size=_ref.size,size=_ref$size===void 0?14:_ref$size,_ref$stroke=_ref.stroke,stroke=_ref$stroke===void 0?"currentColor":_ref$stroke,_ref$strokeWidth=_ref.strokeWidth,strokeWidth=_ref$strokeWidth===void 0?1.6:_ref$strokeWidth;var icons={leaf:/*#__PURE__*/React.createElement("svg",{width:size,height:size,viewBox:"0 0 24 24",fill:"none",stroke:stroke,strokeWidth:strokeWidth,strokeLinecap:"round",strokeLinejoin:"round"},/*#__PURE__*/React.createElement("path",{d:"M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10z"}),/*#__PURE__
